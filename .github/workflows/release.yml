name: Build release package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build plugin zip
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check plugin files
        run: ./scripts/check.sh

      - name: Build zip
        run: ./scripts/build-zip.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: barnahus-site-tools
          path: dist/*.zip

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes
          gh release upload "$TAG_NAME" dist/*.zip --clobber
